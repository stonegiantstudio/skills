name: sync-check

# Enforces the single-source-of-truth invariant: the generated plugin skills,
# platform manifests, and skills.sh.json list must match what skills/ produces.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full commit SHAs (mutable tags can be repointed). Comments
      # track the human-readable version; update SHA + comment together.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      # No dependencies to install — the sync script is zero-dep Node.
      - run: npm run sync:plugin-skills:check
